<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="url(#bgGradient)"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#glowGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Shield shape -->
  <path d="M 50 15 L 30 30 L 30 50 C 30 70 50 85 50 85 C 50 85 70 70 70 50 L 70 30 Z" 
        fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Checkmark -->
  <path d="M 40 50 L 47 57 L 62 38" 
        fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Alert dots (threats) -->
  <circle cx="28" cy="25" r="2.5" fill="#ef4444" opacity="0.8"/>
  <circle cx="72" cy="28" r="2" fill="#f59e0b" opacity="0.7"/>
  <circle cx="75" cy="55" r="1.8" fill="#ec4899" opacity="0.6"/>
  
  <!-- Border -->
  <rect width="100" height="100" fill="none" stroke="#0ea5e9" stroke-width="1" rx="10" opacity="0.5"/>
</svg>
